on: [push, pull_request]
name: CI
jobs:
  build:
    name: "Build on Racket '${{ matrix.racket-version }}' (${{ matrix.racket-variant }})"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        racket-version: ["stable", "current"]
        racket-variant: ["CS"]
        include:
          - racket-version: current
            experimental: true
    steps:
      - uses: actions/checkout@v6
      - uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: x64
          distribution: full
          variant: ${{ matrix.racket-variant }}
          version: ${{ matrix.racket-version }}
      - name: Installing verse-calculus-redex and its dependencies
        run: raco pkg install --no-docs --auto --name verse-calculus-redex
      - name: Compiling verse-calculus-redex and building its docs
        run: raco setup --check-pkg-deps --unused-pkg-deps verse-calculus-redex
      - name: Testing verse-calculus-redex
        run: raco test -x -p verse-calculus-redex
